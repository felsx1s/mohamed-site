<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LixTev</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    margin:0;
    font-family: Consolas, monospace;
    background:black;
    color:#00ffcc;
    overflow:hidden;
}

/* Neon subtle background */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: linear-gradient(45deg,#00ffcc,#0066ff,#ff00ff,#00ffcc);
    opacity:0.05;
    animation: moveBg 20s linear infinite alternate;
    z-index:-1;
}
@keyframes moveBg {
    0% {transform:translate(0,0);}
    100% {transform:translate(-50%,-50%);}
}

/* Particles */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* Card */
.card {
    position:relative;
    z-index:2;
    width:90%;
    max-width:400px;
    margin:60px auto;
    padding:30px;
    border-radius:25px;
    background: rgba(0,255,204,0.08);
    border:1px solid #00ffcc;
    box-shadow: 0 0 25px #00ffcc, 0 0 60px #00ffcc;
    text-align:center;
}

h1 {
    text-shadow:0 0 15px #00ffcc,0 0 35px #00ffcc,0 0 50px #ff00ff;
    margin-bottom:10px;
}

.typing {
    border-right:2px solid #00ffcc;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    display:inline-block;
    animation:typing 3s steps(25) forwards, blink 0.5s infinite;
    margin-bottom:20px;
}
@keyframes typing { to {width:100%;} }
@keyframes blink { 50%{border-color:transparent;} }

img {
    width:120px;
    border-radius:50%;
    border:2px solid #00ffcc;
    box-shadow:0 0 35px #00ffcc,0 0 70px #ff00ff;
    margin-bottom:15px;
}

.socials a {
    color:#00ffcc;
    font-size:30px;
    margin:0 12px;
    display:inline-block;
    transition:0.4s;
}
.socials a:hover {
    transform:scale(1.3);
    text-shadow:0 0 25px #00ffcc,0 0 50px #ff00ff;
}

button {
    margin-top:20px;
    padding:12px 28px;
    border:1px solid #00ffcc;
    background:transparent;
    color:#00ffcc;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    background:#00ffcc;
    color:black;
    box-shadow:0 0 35px #00ffcc,0 0 70px #ff00ff;
}

.counter {
    margin-top:15px;
    font-size:14px;
}

#aiResponse {
    margin-top:15px;
    font-size:14px;
    text-align:left;
    color:#00ffcc;
}

footer {
    margin-top:40px;
    padding:10px;
    text-align:center;
    font-size:12px;
    color:#00ffcc;
    text-shadow:0 0 10px #00ffcc;
}
footer span {
    display:block;
    margin-top:5px;
    font-size:12px;
    color:#ff00ff;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="card">
    <img src="https://i.imgur.com/4M34hi2.png" alt="Jimmy">

    <h1>Mohamed Diab</h1>
    <p class="typing">Welcome to my Dashbord 😎</p>

    <div class="socials">
        <a href="https://wa.me/201055856967"><i class="fab fa-whatsapp"></i></a>
        <a href="https://facebook.com/jimmy12088"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/mohamed_diab_90"><i class="fab fa-instagram"></i></a>
    </div>

    <button onclick="sayHi()">Shop ⚡</button>

    <div class="counter">
        Visitors: <span id="visits">...</span>
    </div>

    <div style="margin-top:20px;">
        <input id="userInput" placeholder="Ask about me..." style="padding:10px;width:80%;">
        <button onclick="askAI()">Ask 🤖</button>
    </div>
    <div id="aiResponse"></div>
</div>

<footer>
    Made by Jimmy 👑
    <span>Powered by Mohamed️</span>
</footer>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
// Particles
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speedY:Math.random()*0.5 + 0.2
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.y+=p.speedY;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
        ctx.fillStyle="#00ffcc";
        ctx.fillRect(p.x,p.y,p.size,p.size);
    });
    requestAnimationFrame(animate);
}
animate();

// Button opens local page
function sayHi(){
    window.location.href = "page2.html"; // يفتح الصفحة بس عند الضغط
}

// Visitor counter
fetch("https://api.countapi.xyz/hit/jimmy-site/visits")
.then(res=>res.json())
.then(res=>{
    document.getElementById("visits").innerText = res.value;
});

// AI Chat
function askAI(){
    let input = document.getElementById("userInput").value.toLowerCase();
    let response = "";

    if(input.includes("name") || input.includes("اسمك")){
        response = "My name is Mohamed Diab Sahyon 👑";
    }
    else if(input.includes("age") || input.includes("عمرك")){
        response = "I am 17 years old 😎";
    }
    else if(input.includes("country") || input.includes("from")){
        response = "I'm from Egypt 🇪🇬";
    }
    else if(input.includes("what do you do") || input.includes("job")){
        response = "I'm a programmer 💻 and gamer 🎮";
    }
    else if(input.includes("الاخوات") || input.includes("brothers")){
        response = "Mohamed [Marvel]  |  mahmoued [7OUDA]";
    }
    else if(input.includes("مساعده") || input.includes("help")){
        response = "الاوامر  عمرك  | اسمك";
    }
    else if(input.includes("contact")){
        response = "You can contact me from the social icons above 😉";
    }
    else{
        response = "I don't understand 🤔 try asking about me!";
    }

    document.getElementById("aiResponse").innerText = response;
}
</script>

</body>
</html>
